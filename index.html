<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title data-i18n="title">Metronome</title>
<style>
  :root{--bg:#0f1724;--card:#0b1220;--accent:#06b6d4;--muted:#94a3b8}
  html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;background:linear-gradient(180deg,#071021 0%,#071827 100%);color:#e6eef6}
  .wrap{max-width:720px;margin:40px auto;padding:24px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));border-radius:12px;box-shadow:0 6px 30px rgba(2,6,23,0.6)}
  h1{margin:0 0 12px;font-size:1.4rem}
  .top-row{display:flex;gap:12px;align-items:center}
  .lang-select{margin-left:auto}
  .controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-top:12px}
  label{display:block;font-size:0.85rem;color:var(--muted);margin-bottom:6px}
  input[type=number],select,input[type=range]{width:100%;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit}
  .row{display:flex;gap:8px;align-items:center}
  button{background:var(--accent);border:none;color:#042027;padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:600}
  button.secondary{background:transparent;border:1px solid rgba(255,255,255,0.06);color:inherit}
  .visual{height:80px;border-radius:8px;background:linear-gradient(90deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));display:flex;align-items:center;justify-content:center;margin-top:16px;position:relative;overflow:hidden}
  .dot{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.06);transition:transform .06s ease, background .06s ease, box-shadow .06s ease}
  .dot.accent{background:var(--accent);box-shadow:0 6px 18px rgba(6,182,212,0.18)}
  .meter{display:flex;gap:8px;align-items:center}
  .tap-hint{font-size:0.85rem;color:var(--muted)}
  footer{margin-top:16px;font-size:0.8rem;color:var(--muted)}
  @media (max-width:420px){.controls{grid-template-columns:1fr}}
</style>
</head>
<body>
  <div class="wrap" role="application" aria-label="Metronome">
    <div class="top-row">
      <h1 data-i18n="title">Metronome</h1>
      <div class="lang-select">
        <label for="lang" style="display:none">Language</label>
        <select id="lang" aria-label="Language selector">
          <option value="ja">日本語</option>
          <option value="en">English</option>
        </select>
      </div>
    </div>

    <div class="controls" aria-hidden="false">
      <div>
        <label for="bpm" data-i18n="bpmLabel">BPM</label>
        <input id="bpm" type="number" min="20" max="300" value="120" aria-label="BPM input" />
      </div>
      <div>
        <label for="beats" data-i18n="beatsLabel">Beats / Bar</label>
        <select id="beats" aria-label="Beats per bar">
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4" selected>4</option>
          <option value="5">5</option>
          <option value="6">6</option>
        </select>
      </div>
      <div>
        <label for="sub" data-i18n="subLabel">Subdivision</label>
        <select id="sub" aria-label="Subdivision">
          <option value="1" selected>1 (quarter)</option>
          <option value="2">2 (eighth)</option>
          <option value="3">3 (triplet)</option>
          <option value="4">4 (16th)</option>
        </select>
      </div>
      <div>
        <label for="volume" data-i18n="volLabel">Volume</label>
        <input id="volume" type="range" min="0" max="1" step="0.01" value="0.8" aria-label="Volume" />
      </div>
    </div>

    <div class="row" style="margin-top:12px;">
      <button id="start" data-i18n="startBtn">Start</button>
      <button id="stop" class="secondary" data-i18n="stopBtn">Stop</button>
      <button id="tap" class="secondary" data-i18n="tapBtn">Tap</button>
      <div style="margin-left:auto;text-align:right">
        <div class="tap-hint" id="tapHint" data-i18n="tapHint">Tap tempo: 4 taps to set BPM</div>
      </div>
    </div>

    <div class="visual" aria-hidden="false">
      <div class="meter" id="meter" aria-hidden="true">
        <div class="dot" id="dot"></div>
      </div>
    </div>

    <footer id="footer" data-i18n="footer">Made for GitHub Pages — works in modern browsers (Chrome/Edge/Firefox/Safari)</footer>
  </div>

<script>
(() => {
  // --- Translation data ---
  const translations = {
    ja: {
      title: "メトロノーム",
      bpmLabel: "BPM",
      beatsLabel: "小節の拍数",
      subLabel: "分割",
      volLabel: "音量",
      startBtn: "再生",
      stopBtn: "停止",
      tapBtn: "タップ",
      tapHint: "タップテンポ：4回タップでBPMを設定",
      footer: "最新ブラウザで動作します（Chrome/Edge/Firefox/Safari）"
    },
    en: {
      title: "Metronome",
      bpmLabel: "BPM",
      beatsLabel: "Beats / Bar",
      subLabel: "Subdivision",
      volLabel: "Volume",
      startBtn: "Start",
      stopBtn: "Stop",
      tapBtn: "Tap",
      tapHint: "Tap tempo: 4 taps to set BPM",
      footer: "works in modern browsers (Chrome/Edge/Firefox/Safari)"
    }
  };

  // --- Elements ---
  const langSel = document.getElementById('lang');
  const i18nNodes = document.querySelectorAll('[data-i18n]');
  const bpmInput = document.getElementById('bpm');
  const startBtn = document.getElementById('start');
  const stopBtn = document.getElementById('stop');
  const tapBtn = document.getElementById('tap');
  const beatsSel = document.getElementById('beats');
  const subSel = document.getElementById('sub');
  const volRange = document.getElementById('volume');
  const dot = document.getElementById('dot');

  // Audio context and scheduling
  let audioCtx = null;
  let isRunning = false;
  let currentNote = 0;
  let tempo = 120;
  let lookahead = 25.0; // ms
  let scheduleAheadTime = 0.1; // seconds
  let nextNoteTime = 0.0;
  let timerID = null;
  let beatsPerBar = 4;
  let subdivision = 1;
  let gainNode = null;

  // Tap tempo
  let tapTimes = [];

  // --- i18n functions ---
  function applyTranslations(lang) {
    const dict = translations[lang] || translations.en;
    i18nNodes.forEach(node => {
      const key = node.getAttribute('data-i18n');
      if (!key) return;
      // For inputs with placeholder or title, set appropriately
      if (node.tagName.toLowerCase() === 'input' && node.type === 'number') {
        // keep numeric value, but label is separate; skip
      }
      // Update text content for labels, buttons, footer, title
      if (node.tagName.toLowerCase() === 'title') {
        node.textContent = dict[key] || node.textContent;
      } else if (node.tagName.toLowerCase() === 'input' && node.type === 'range') {
        // range label handled elsewhere
      } else {
        node.textContent = dict[key] || node.textContent;
      }
    });
    // Update document lang attribute and title element
    document.documentElement.lang = (lang === 'ja') ? 'ja' : 'en';
    // Save preference
    try { localStorage.setItem('metronome_lang', lang); } catch(e){}
  }

  function initLanguage() {
    const saved = (function(){ try { return localStorage.getItem('metronome_lang'); } catch(e){ return null; } })();
    const nav = navigator.language && navigator.language.startsWith('ja') ? 'ja' : 'en';
    const lang = saved || nav;
    langSel.value = lang;
    applyTranslations(lang);
  }

  langSel.addEventListener('change', (e) => {
    applyTranslations(e.target.value);
  });

  // --- Audio helpers ---
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      gainNode = audioCtx.createGain();
      gainNode.gain.value = parseFloat(volRange.value);
      gainNode.connect(audioCtx.destination);
    }
  }

  function playClick(time, isAccent=false) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = isAccent ? 'sine' : 'square';
    osc.frequency.value = isAccent ? 1000 : 800;
    g.gain.value = isAccent ? 0.6 : 0.35;
    osc.connect(g);
    g.connect(gainNode);
    osc.start(time);
    g.gain.exponentialRampToValueAtTime(0.0001, time + 0.06);
    osc.stop(time + 0.07);
  }

  function nextNote() {
    const secondsPerBeat = 60.0 / tempo;
    nextNoteTime += (1.0 / subdivision) * secondsPerBeat;
    currentNote++;
  }

  function scheduleNote(beatNumber, time) {
    const totalSubdivision = beatsPerBar * subdivision;
    const beatIndex = beatNumber % totalSubdivision;
    const isAccent = (beatIndex % (subdivision * beatsPerBar) === 0);
    playClick(time, isAccent);
    const now = audioCtx.currentTime;
    const delay = Math.max(0, (time - now) * 1000);
    setTimeout(() => flash(isAccent), delay);
  }

  function scheduler() {
    while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
      scheduleNote(currentNote, nextNoteTime);
      nextNote();
    }
    timerID = setTimeout(scheduler, lookahead);
  }

  function start() {
    if (isRunning) return;
    initAudio();
    tempo = parseFloat(bpmInput.value) || 120;
    beatsPerBar = parseInt(beatsSel.value, 10) || 4;
    subdivision = parseInt(subSel.value, 10) || 1;
    currentNote = 0;
    nextNoteTime = audioCtx.currentTime + 0.05;
    isRunning = true;
    scheduler();
  }

  function stop() {
    if (!isRunning) return;
    clearTimeout(timerID);
    isRunning = false;
    dot.style.transform = 'scale(1)';
    dot.classList.remove('accent');
  }

  function flash(accent) {
    dot.style.transform = 'scale(1.6)';
    if (accent) dot.classList.add('accent');
    setTimeout(() => {
      dot.style.transform = 'scale(1)';
      dot.classList.remove('accent');
    }, 120);
  }

  // --- Event listeners ---
  startBtn.addEventListener('click', () => {
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    start();
  });

  stopBtn.addEventListener('click', () => stop());

  volRange.addEventListener('input', () => {
    if (gainNode) gainNode.gain.value = parseFloat(volRange.value);
  });

  bpmInput.addEventListener('change', () => {
    tempo = parseFloat(bpmInput.value) || tempo;
  });

  beatsSel.addEventListener('change', () => {
    beatsPerBar = parseInt(beatsSel.value, 10);
  });

  subSel.addEventListener('change', () => {
    subdivision = parseInt(subSel.value, 10);
  });

  // Tap tempo logic
  tapBtn.addEventListener('click', () => {
    const now = performance.now();
    tapTimes.push(now);
    if (tapTimes.length > 6) tapTimes.shift();
    if (tapTimes.length >= 2) {
      let intervals = [];
      for (let i = 1; i < tapTimes.length; i++) intervals.push(tapTimes[i] - tapTimes[i-1]);
      const avg = intervals.reduce((a,b)=>a+b,0)/intervals.length;
      const newBpm = Math.round(60000 / avg);
      bpmInput.value = Math.max(20, Math.min(300, newBpm));
      tempo = parseFloat(bpmInput.value);
    }
    clearTimeout(tapBtn._clearTimer);
    tapBtn._clearTimer = setTimeout(()=>tapTimes=[], 2000);
  });

  // Keyboard shortcuts
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      isRunning ? stop() : start();
    } else if (e.key.toLowerCase() === 't') {
      tapBtn.click();
    }
  });

  // Accessibility focus styles
  document.querySelectorAll('button,input,select').forEach(el=>{
    el.addEventListener('focus', ()=>el.style.outline='2px solid rgba(6,182,212,0.18)');
    el.addEventListener('blur', ()=>el.style.outline='none');
  });

  // Clean up on page hide
  window.addEventListener('pagehide', () => {
    if (audioCtx) audioCtx.close();
  });

  // Initialize language and UI
  initLanguage();
})();
</script>
</body>
</html>
